<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Tracker</title>

    <!-- tailwind -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- icon cdn -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        *{
            font-family: "Geist", sans-serif; 
        }
    </style>

</head>
<body class="mt-15 mb-15 bg-[#F8FAFC]">

    <!-- Header Section -->
   <header class="w-[80%] mx-auto">
    <h1 class="text-4xl font-bold text-[#002C5C]">Job Application Tracker</h1>
    <div class="grid grid-cols-3 gap-4 mt-5">
        <div class="bg-white p-5 rounded-md border border-[#F1F2F4]">
            <p class="text-sm text-[#323B49] font-medium">Total</p>
            <p class="text-2xl font-bold text-[#002B70]">0</p>
        </div>

        <div class="bg-white p-5 rounded-md border border-[#F1F2F4]">
            <p class="text-sm text-[#323B49] font-medium">Interview</p>
            <p class="text-2xl font-bold text-[#10B981]">0</p>
        </div>

        <div class="bg-white p-5 rounded-md border border-[#F1F2F4]">
            <p class="text-sm text-[#323B49] font-medium">Rejected</p>
            <p class="text-2xl font-bold text-[#EF4444]">0</p>
        </div>

    </div>
    <hr class="my-5 text-[#E6E7E9] border-1">
</header>

    

</body>
</html>
